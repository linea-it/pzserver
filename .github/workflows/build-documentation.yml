# This workflow installs Python dependencies, builds the package, and builds the documentation.

name: Build documentation

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build_doc
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        sudo apt-get update
        uv pip install --system -e '.[dev]'
        if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - name: Install notebook requirements
      run: |
        sudo apt-get install pandoc
    - name: Build docs
      run: |
        sphinx-build -T -E -b html -d docs/build/doctrees ./docs docs/build/html -D exclude_patterns="notebooks/**.ipynb"
    - name: Run ghp-import
      run: |
        ghp-import -n -p -f -x docs/ docs/build/html
