name: Rubin Recommended compatibility

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: 15 7 * * *

jobs:
  rubin-recommended-compatibility:
    name: rubin_recommended_compatibility
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install dependencies with Rubin Recommended constraints
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e '.[dev]' -c constraints-rubin-recommended.txt
    - name: Run unit tests with pytest
      run: |
        python -m pytest
